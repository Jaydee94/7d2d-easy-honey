name: CI

"on":
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate XML files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate XML files
        run: |
          set -euo pipefail
          find . -name '*.xml' | while read -r file; do
            echo "Validating: $file"
            xmllint --noout "$file"
          done
          echo "All XML files are well-formed."
