name: Release

"on":
  push:
    branches:
      - main
    paths:
      - 'Config/**'
      - 'ModInfo.xml'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  release:
    name: Package and publish mod release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mod version
        id: modversion
        run: |
          VERSION=$(grep -oP '(?<=value=")[^"]+' ModInfo.xml | sed -n '3p')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Mod version: ${VERSION}"

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate XML files
        run: |
          set -euo pipefail
          find . -name '*.xml' | while read -r file; do
            echo "Validating: $file"
            xmllint --noout "$file"
          done
          echo "All XML files are well-formed."

      - name: Package mod
        run: |
          MOD_VERSION="${{ steps.modversion.outputs.VERSION }}"
          STAGING="staging/EasyHoney"

          mkdir -p "${STAGING}/Config"

          cp ModInfo.xml "${STAGING}/"
          cp Config/* "${STAGING}/Config/"

          cd staging
          zip -r "../EasyHoney-v${MOD_VERSION}.zip" EasyHoney/
          echo "Created EasyHoney-v${MOD_VERSION}.zip"
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOD_VERSION="${{ steps.modversion.outputs.VERSION }}"
          TAG="v${MOD_VERSION}"
          ASSET="EasyHoney-v${MOD_VERSION}.zip"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" "${ASSET}" \
            --title "EasyHoney ${TAG}" \
            --notes "## Easy Honey Mod ${TAG}

          Automated release built from \`main\` for **7 Days to Die v2.6**.

          ### Installation
          1. Download \`${ASSET}\` and unzip it.
          2. Copy the \`EasyHoney/\` folder into your game's or server's \`Mods/\` directory.
          3. Restart the game or server.

          ### What's inside
          \`\`\`
          EasyHoney/
          ├── ModInfo.xml
          └── Config/
              ├── blocks.xml
              └── loot.xml
          \`\`\`

          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for details."
